<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slimbot AI Assistant</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .chat-container {
            width: 90%;
            max-width: 900px;
            height: 80vh;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 1.05rem;
            line-height: 1.5;
            position: relative;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .alert-toast {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ef4444;
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2);
            display: none;
            animation: slideIn 0.3s ease-out;
            z-index: 100;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .chat-input-area {
            padding: 30px;
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .typing {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 10px;
            display: none;
        }

        .image-preview {
            display: none;
            padding: 10px 30px;
            position: relative;
        }

        .image-preview img {
            max-width: 150px;
            max-height: 150px;
            border-radius: 12px;
            border: 2px solid var(--primary);
        }

        .remove-img {
            position: absolute;
            top: 5px;
            left: 170px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 12px;
        }

        .message img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            display: block;
        }

        /* Code block styles */
        .code-block-wrapper {
            position: relative;
            margin: 12px 0;
            border-radius: 12px;
            overflow: hidden;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .code-block-header .lang-label {
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .copy-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: none;
            box-shadow: none;
            filter: none;
        }

        .code-block-wrapper pre {
            margin: 0;
            padding: 16px;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        .code-block-wrapper code {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #e2e8f0;
            white-space: pre;
        }

        /* Inline code */
        .inline-code {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 2px 7px;
            border-radius: 5px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.85em;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .file-upload-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: #94a3b8;
            padding: 0 15px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .file-upload-btn:hover {
            border-color: var(--primary);
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="chat-header">
            <img src="logo.png" alt="Slimbot"
                style="width: 40px; height: 40px; border-radius: 10px; box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);">
            <h1 style="font-size: 1.5rem; font-weight: 600;">Slimbot</h1>
            <div class="status-dot" style="margin-left: auto;"></div>
        </div>
        <div id="alertToast" class="alert-toast"></div>
        <div class="chat-messages" id="messages">
            <div class="message bot-message">
                Hello I'm Slimbot. How can I assist you today?
            </div>
        </div>
        <div id="imagePreview" class="image-preview">
            <img id="previewImg" src="">
            <div class="remove-img" id="removeImg">×</div>
        </div>
        <div class="chat-input-area">
            <div id="typing" class="typing">Slimbot is thinking...</div>
            <label class="file-upload-btn">
                <span>📎</span>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
            </label>
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingDiv = document.getElementById('typing');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewImg = document.getElementById('previewImg');
        const removeImg = document.getElementById('removeImg');

        let selectedFile = null;

        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (re) => {
                    previewImg.src = re.target.result;
                    imagePreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        removeImg.addEventListener('click', () => {
            selectedFile = null;
            imageInput.value = '';
            imagePreview.style.display = 'none';
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !selectedFile) return;

            const formData = new FormData();
            formData.append('message', text || 'Analyze this image');
            formData.append('sessionId', 'web_session');

            if (selectedFile) {
                formData.append('image', selectedFile);
                const reader = new FileReader();
                reader.onload = (re) => {
                    addMessage(text, 'user', null, re.target.result);
                };
                reader.readAsDataURL(selectedFile);
            } else {
                addMessage(text, 'user');
            }

            userInput.value = '';
            const currentFile = selectedFile; // Preserve for UI but clear for next message
            selectedFile = null;
            imageInput.value = '';
            imagePreview.style.display = 'none';

            // Show typing indicator
            typingDiv.style.display = 'block';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                const response = await fetch('chat.php', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                typingDiv.style.display = 'none';

                if (data.error) {
                    addMessage('Error: ' + data.error, 'bot');
                } else {
                    addMessage(data.response, 'bot');
                }

                // Sync message count from server (tool calls may create extra filtered messages)
                try {
                    const syncResp = await fetch(`newmessages.php?sessionId=web_session&since=999999`);
                    const syncData = await syncResp.json();
                    knownMessageCount = syncData.total || knownMessageCount + 2;
                } catch (e) {
                    knownMessageCount += 2;
                }
            } catch (err) {
                typingDiv.style.display = 'none';
                addMessage('Error connecting to server.', 'bot');
            }
        }

        function parseMarkdown(text) {
            if (!text) return '';

            // Handle multimodal content (array of objects)
            if (Array.isArray(text)) {
                let combinedHtml = '';
                text.forEach(part => {
                    if (part.type === 'text') {
                        combinedHtml += parseMarkdown(part.text);
                    } else if (part.type === 'image_url') {
                        combinedHtml += `<img src="${part.image_url.url}" alt="Image">`;
                    }
                });
                return combinedHtml;
            }

            if (typeof text !== 'string') return '';

            // 1) Extract fenced code blocks FIRST (before other transformations)
            const codeBlocks = [];
            let processed = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                const placeholder = `%%CODEBLOCK_${codeBlocks.length}%%`;
                const escapedCode = code
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                const langLabel = lang || 'code';
                const blockId = `codeblock_${Date.now()}_${codeBlocks.length}`;
                codeBlocks.push(
                    `<div class="code-block-wrapper">` +
                    `<div class="code-block-header">` +
                    `<span class="lang-label">${langLabel}</span>` +
                    `<button class="copy-btn" onclick="copyCode('${blockId}')">Copy</button>` +
                    `</div>` +
                    `<pre><code id="${blockId}">${escapedCode}</code></pre>` +
                    `</div>`
                );
                return placeholder;
            });

            // 2) Inline code (single backticks)
            processed = processed.replace(/`([^`]+)`/g, '<span class="inline-code">$1</span>');

            // 3) Bold
            processed = processed.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

            // 4) Bullet points
            processed = processed.replace(/^- (.*)/gm, '• $1');

            // 5) Newlines
            processed = processed.replace(/\n/g, '<br>');

            // 6) Media paths (images, audio)
            const pathRegex = /\/home\/[^\s]+?\/workspace\/[^\s]+?\.(png|jpg|jpeg|webp)/gi;
            processed = processed.replace(pathRegex, (match) => {
                const workspaceIndex = match.indexOf('workspace/');
                if (workspaceIndex !== -1) {
                    const relativePath = match.substring(workspaceIndex + 10);
                    return `<img src="view.php?path=${encodeURIComponent(relativePath)}" alt="Image">`;
                }
                return match;
            });

            const audioAbsRegex = /\/home\/[^\s]+?\/workspace\/audio\/[^\s]+?\.(mp3|wav)/gi;
            processed = processed.replace(audioAbsRegex, (match) => {
                const workspaceIndex = match.indexOf('workspace/');
                if (workspaceIndex !== -1) {
                    const relativePath = match.substring(workspaceIndex + 10);
                    return `<audio controls src="view.php?path=${encodeURIComponent(relativePath)}"></audio>`;
                }
                return match;
            });

            const viewAudioRegex = /view\.php\?path=audio\/[^\s]+?\.(mp3|wav)/gi;
            processed = processed.replace(viewAudioRegex, (match) => {
                return `<audio controls src="${match}"></audio>`;
            });

            const relPathRegex = /(?<!src=")workspace\/[^\s]+?\.(png|jpg|jpeg|webp)/gi;
            processed = processed.replace(relPathRegex, (match) => {
                const relativePath = match.substring(10);
                return `<img src="view.php?path=${encodeURIComponent(relativePath)}" alt="Image">`;
            });

            const relAudioRegex = /(?<!src=")workspace\/audio\/[^\s]+?\.(mp3|wav)/gi;
            processed = processed.replace(relAudioRegex, (match) => {
                const relativePath = match.substring(10);
                return `<audio controls src="view.php?path=${encodeURIComponent(relativePath)}"></audio>`;
            });

            // 7) Restore code blocks
            codeBlocks.forEach((block, i) => {
                processed = processed.replace(`%%CODEBLOCK_${i}%%`, block);
            });

            return processed;
        }

        function copyCode(blockId) {
            const codeEl = document.getElementById(blockId);
            if (codeEl) {
                const text = codeEl.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    const btn = codeEl.closest('.code-block-wrapper').querySelector('.copy-btn');
                    btn.textContent = 'Copied!';
                    setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
                });
            }
        }

        function addMessage(text, role, timestamp = null, imageUrl = null) {
            const div = document.createElement('div');
            div.className = `message ${role}-message`;

            const timeStr = timestamp || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            let contentHtml = parseMarkdown(text);
            if (imageUrl) {
                contentHtml += `<img src="${imageUrl}" alt="User uploaded image">`;
            }

            div.innerHTML = `
                <div class="message-text" style="word-break: break-word; line-height: 1.6;">${contentHtml}</div>
                <div class="message-time" style="font-size: 0.75rem; opacity: 0.5; margin-top: 8px; text-align: ${role === 'user' ? 'right' : 'left'}">${timeStr}</div>
            `;

            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        let knownMessageCount = 0;

        async function loadHistory() {
            try {
                const response = await fetch('history.php?sessionId=web_session');
                const data = await response.json();
                if (data.history && data.history.length > 0) {
                    messagesDiv.innerHTML = ''; // Clear welcome message
                    data.history.forEach(msg => {
                        addMessage(msg.content, msg.role === 'user' ? 'user' : 'bot', msg.timestamp);
                    });
                    knownMessageCount = data.history.length;
                }
            } catch (err) {
                console.error("Failed to load history", err);
            }
        }

        async function checkForNewMessages() {
            try {
                const response = await fetch(`newmessages.php?sessionId=web_session&since=${knownMessageCount}`);
                const data = await response.json();
                if (data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        addMessage(msg.content, msg.role === 'user' ? 'user' : 'bot', msg.timestamp);
                    });
                    knownMessageCount = data.total;
                }
            } catch (err) { }
        }

        // Initialize
        loadHistory();
        setInterval(checkForNewMessages, 15000); // Check every 15 seconds
    </script>
</body>

</html>
